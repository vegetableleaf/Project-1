# Render.com Blueprint -- deploy the x402 service with one click.
# In Render: New -> Blueprint -> point at this repo. Then set the three secret
# env vars it prompts for (PAY_TO, CDP_API_KEY_ID, CDP_API_KEY_SECRET).
#
# MAINNET (active below): accepts REAL USDC on Base mainnet via the CDP
# facilitator and lists on the x402 Bazaar. Requires a CDP Secret API key
# (CDP_API_KEY_ID + CDP_API_KEY_SECRET) -- the server needs them at boot on
# mainnet. Create a NEW, dedicated key for this deployment.
#
# REVERT TO TESTNET (free, no CDP keys) -- change these values below:
#   X402_NETWORK      = eip155:84532
#   X402_FACILITATOR  = https://x402.org/facilitator
#   X402_BAZAAR       = 0
# The image already bundles cdp-sdk, so switching network is a config change.
# (You do NOT need CDP_WALLET_SECRET here: receiving x402 payments never moves
#  your own funds, so the Wallet Secret is not required on the server.)
services:
  - type: web
    name: money-agent-x402
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PAY_TO                 # your receiving wallet (0x... CDP address)
        sync: false
      - key: X402_NETWORK           # eip155:8453 = Base mainnet (real); eip155:84532 = Base Sepolia (test)
        value: eip155:8453
      - key: X402_FACILITATOR       # CDP (mainnet) or x402.org test: https://x402.org/facilitator
        value: https://api.cdp.coinbase.com/platform/v2/x402
      - key: X402_BAZAAR            # "1" to publish to the x402 Bazaar (needs the CDP facilitator)
        value: "1"
      - key: CDP_API_KEY_ID         # required on mainnet (CDP facilitator / Bazaar)
        sync: false
      - key: CDP_API_KEY_SECRET
        sync: false
